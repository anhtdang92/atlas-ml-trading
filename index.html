<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto ML Trading Dashboard - Live Prices</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .status {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            margin-top: 15px;
            font-size: 0.9em;
        }

        .status.loading {
            background: rgba(255,193,7,0.3);
        }

        .status.connected {
            background: rgba(76,175,80,0.3);
        }

        .status.error {
            background: rgba(244,67,54,0.3);
        }

        .crypto-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .crypto-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            animation: fadeIn 0.5s ease-in;
        }

        .crypto-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .crypto-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .crypto-icon {
            font-size: 2em;
            margin-right: 15px;
        }

        .crypto-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }

        .crypto-symbol {
            font-size: 0.9em;
            color: #666;
        }

        .price {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .price-change {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 10px;
        }

        .price-change.positive {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .price-change.negative {
            background: #ffebee;
            color: #c62828;
        }

        .details {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            font-size: 0.9em;
            color: #666;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
        }

        .refresh-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
            display: block;
            margin: 0 auto;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .refresh-btn:active {
            transform: scale(0.95);
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }

        .loading-spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Crypto ML Trading Dashboard</h1>
            <p class="subtitle">Live Cryptocurrency Prices from Kraken API</p>
            <div class="status loading" id="status">⏳ Loading...</div>
        </header>

        <div class="crypto-grid" id="cryptoGrid">
            <div class="loading-spinner"></div>
        </div>

        <button class="refresh-btn" onclick="fetchPrices()">🔄 Refresh Prices</button>

        <footer>
            <p>Data provided by Kraken API (Public Endpoint - No Keys Required)</p>
            <p style="margin-top: 10px; font-size: 0.9em;">⚠️ For educational purposes only. Not financial advice.</p>
        </footer>
    </div>

    <script>
        // Cryptocurrency configuration
        const cryptos = [
            { pair: 'XXBTZUSD', name: 'Bitcoin', symbol: 'BTC', icon: '₿' },
            { pair: 'XETHZUSD', name: 'Ethereum', symbol: 'ETH', icon: 'Ξ' },
            { pair: 'SOLUSD', name: 'Solana', symbol: 'SOL', icon: '◎' },
            { pair: 'ADAUSD', name: 'Cardano', symbol: 'ADA', icon: '₳' },
            { pair: 'XRPUSD', name: 'Ripple', symbol: 'XRP', icon: '✕' },
            { pair: 'MATICUSD', name: 'Polygon', symbol: 'MATIC', icon: '⬡' }
        ];

        // Store previous prices for change calculation
        let previousPrices = {};

        // Fetch prices from Kraken API
        async function fetchPrices() {
            const statusEl = document.getElementById('status');
            statusEl.textContent = '⏳ Fetching prices...';
            statusEl.className = 'status loading';

            try {
                // Kraken API endpoint for ticker information
                const pairs = cryptos.map(c => c.pair).join(',');
                const response = await fetch(`https://api.kraken.com/0/public/Ticker?pair=${pairs}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.error && data.error.length > 0) {
                    throw new Error(data.error.join(', '));
                }

                displayPrices(data.result);
                statusEl.textContent = '✅ Connected to Kraken API';
                statusEl.className = 'status connected';
                
            } catch (error) {
                console.error('Error fetching prices:', error);
                statusEl.textContent = '❌ Error connecting to API';
                statusEl.className = 'status error';
                
                document.getElementById('cryptoGrid').innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; color: white; padding: 40px;">
                        <h2>⚠️ Unable to fetch prices</h2>
                        <p style="margin-top: 10px;">${error.message}</p>
                        <p style="margin-top: 10px;">Please check your internet connection and try again.</p>
                    </div>
                `;
            }
        }

        // Display prices in cards
        function displayPrices(result) {
            const grid = document.getElementById('cryptoGrid');
            grid.innerHTML = '';

            cryptos.forEach(crypto => {
                // Find matching data (Kraken sometimes returns different pair names)
                const dataKey = Object.keys(result).find(key => 
                    key.includes(crypto.pair) || 
                    key.replace('X', '').replace('Z', '') === crypto.pair
                );
                
                if (!dataKey) {
                    console.warn(`No data found for ${crypto.pair}`);
                    return;
                }

                const tickerData = result[dataKey];
                const currentPrice = parseFloat(tickerData.c[0]); // Current price
                const dayHigh = parseFloat(tickerData.h[1]); // 24h high
                const dayLow = parseFloat(tickerData.l[1]); // 24h low
                const volume = parseFloat(tickerData.v[1]); // 24h volume
                const openPrice = parseFloat(tickerData.o); // Opening price

                // Calculate 24h change
                const priceChange = ((currentPrice - openPrice) / openPrice) * 100;
                const changeClass = priceChange >= 0 ? 'positive' : 'negative';
                const changeSymbol = priceChange >= 0 ? '▲' : '▼';

                // Store price for next comparison
                previousPrices[crypto.symbol] = currentPrice;

                // Create card
                const card = document.createElement('div');
                card.className = 'crypto-card';
                card.innerHTML = `
                    <div class="crypto-header">
                        <div class="crypto-icon">${crypto.icon}</div>
                        <div>
                            <div class="crypto-name">${crypto.name}</div>
                            <div class="crypto-symbol">${crypto.symbol}/USD</div>
                        </div>
                    </div>
                    <div class="price">$${currentPrice.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
                    <div class="price-change ${changeClass}">
                        ${changeSymbol} ${Math.abs(priceChange).toFixed(2)}% (24h)
                    </div>
                    <div class="details">
                        <div class="detail-row">
                            <span>24h High:</span>
                            <strong>$${dayHigh.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</strong>
                        </div>
                        <div class="detail-row">
                            <span>24h Low:</span>
                            <strong>$${dayLow.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</strong>
                        </div>
                        <div class="detail-row">
                            <span>24h Volume:</span>
                            <strong>${volume.toLocaleString('en-US', { maximumFractionDigits: 0 })} ${crypto.symbol}</strong>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // Auto-refresh every 30 seconds
        setInterval(fetchPrices, 30000);

        // Initial fetch on page load
        fetchPrices();
    </script>
</body>
</html>
