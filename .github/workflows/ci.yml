name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Check formatting with Black
        run: black --check --diff ml/ data/ tests/

      - name: Lint with Flake8
        run: flake8 ml/ data/ --max-line-length=120 --ignore=E501,W503,E203

  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install scikit-learn pandera

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/unit/ -v --tb=short -x \
            --cov=ml --cov=data --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload coverage report
        if: matrix.python-version == '3.11' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  validate:
    name: Data & Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandera scikit-learn

      - name: Validate stock universe config
        run: |
          python -c "
          from data.stock_api import get_all_symbols, STOCK_UNIVERSE
          symbols = get_all_symbols()
          assert len(symbols) == 30, f'Expected 30 symbols, got {len(symbols)}'
          assert len(set(symbols)) == 30, 'Duplicate symbols found'
          print(f'Stock universe validated: {len(symbols)} unique symbols across {len(STOCK_UNIVERSE)} categories')
          "

      - name: Validate feature engineering
        run: |
          python -c "
          import numpy as np
          import pandas as pd
          from ml.feature_engineering import FeatureEngineer

          np.random.seed(42)
          dates = pd.date_range('2023-01-01', periods=300, freq='B')
          price = np.random.randn(300).cumsum() + 150
          df = pd.DataFrame({
              'timestamp': dates,
              'open': price + np.random.randn(300) * 0.5,
              'high': price + abs(np.random.randn(300)) * 2,
              'low': price - abs(np.random.randn(300)) * 2,
              'close': price,
              'volume': np.random.rand(300) * 1e6 + 5e5,
          })

          fe = FeatureEngineer()
          df_feat = fe.calculate_features(df)
          assert len(fe.features) == 25, f'Expected 25 features, got {len(fe.features)}'
          assert not df_feat[fe.features].isnull().any().any(), 'NaN in features'

          X, y = fe.create_sequences(df_feat, lookback=30)
          assert X.ndim == 3 and X.shape[1] == 30 and X.shape[2] == 25
          print(f'Feature engineering validated: {len(fe.features)} features, X{X.shape}, y{y.shape}')
          "

      - name: Validate ML modules import
        run: |
          python -c "
          from ml.feature_importance import FeatureImportanceAnalyzer
          from ml.backtest_tearsheet import BacktestTearsheet
          from ml.experiment_tracker import ExperimentTracker
          from ml.baseline_models import compare_baselines
          print('All ML modules import successfully')
          "

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t atlas-dashboard .

      - name: Verify container starts
        run: |
          docker run -d --name atlas-test -p 8501:8501 atlas-dashboard
          sleep 10
          curl -f http://localhost:8501/_stcore/health || echo "Health check pending"
          docker stop atlas-test
          docker rm atlas-test
