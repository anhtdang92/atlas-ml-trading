# Crypto ML Trading Dashboard Configuration

# Trading pairs to monitor and trade
trading:
  symbols:
    - BTC  # Bitcoin
    - ETH  # Ethereum
    - SOL  # Solana
    - ADA  # Cardano
  
  # Rebalancing schedule
  rebalance_day: "Sunday"  # Day of week
  rebalance_hour: 22       # 10 PM
  rebalance_timezone: "America/Chicago"  # CDT
  
  # Initial portfolio
  initial_capital: 5000.0  # USD
  
  # Risk management
  max_position_size: 0.40   # 40% max per coin
  min_position_size: 0.10   # 10% min per coin
  min_trade_amount: 50.0    # Minimum $50 per trade
  max_single_trade: 2000.0  # Maximum $2000 per trade
  
  # Trading mode
  paper_trading: true  # Set to false for live trading (BE CAREFUL!)

# ML Model Configuration
ml:
  model_type: "LSTM"
  
  # LSTM architecture
  lstm:
    layers: 2
    units: 50
    dropout: 0.2
    
  # Training parameters
  training:
    lookback_days: 7        # Use 7 days to predict next day
    prediction_horizon: 7   # Predict 7 days ahead
    train_val_split: 0.8    # 80% train, 20% validation
    batch_size: 32
    epochs: 100
    early_stopping_patience: 10
    
  # Feature engineering
  features:
    moving_averages: [7, 14, 30]
    use_rsi: true
    use_volume_indicators: true
    use_momentum: true

# Data fetching
data:
  source: "kraken"  # Primary data source
  backup_source: "coinapi"  # Backup if Kraken fails
  
  # Historical data
  historical_days: 365  # Fetch 1 year of historical data
  
  # Update schedule
  update_frequency: "daily"  # How often to fetch new data
  update_hour: 1  # 1 AM

# Google Cloud Platform
gcp:
  region: "us-central1"
  project_id: "crypto-ml-trading-487"
  
  # BigQuery
  bigquery:
    dataset: "crypto_data"
    tables:
      historical_prices: "historical_prices"
      predictions: "predictions"
      trades: "trades"
      model_metrics: "model_metrics"
  
  # Cloud Storage
  storage:
    models_bucket: "crypto-ml-models-487"
    backups_bucket: "crypto-ml-backups-487"
  
  # Vertex AI
  vertex_ai:
    machine_type: "n1-standard-4"
    use_preemptible: true  # Save costs

# Streamlit Dashboard
dashboard:
  title: "Crypto ML Trading Dashboard"
  refresh_interval: 60  # seconds
  cache_ttl: 300  # Cache data for 5 minutes
  
  # Display settings
  display:
    currency: "USD"
    decimal_places: 2
    use_dark_mode: true

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "json"
  log_to_bigquery: true

# Notifications
notifications:
  enabled: true
  channels:
    - "email"
    # - "slack"  # Uncomment when configured
  
  # When to send notifications
  notify_on:
    - "trade_execution"
    - "model_training_complete"
    - "api_errors"
    - "weekly_summary"

