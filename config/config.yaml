# Stock ML Trading Dashboard Configuration

# Stock universe to monitor and trade
trading:
  # FAANG+ Tech Leaders
  tech_stocks:
    - AAPL   # Apple
    - MSFT   # Microsoft
    - GOOGL  # Alphabet
    - AMZN   # Amazon
    - NVDA   # NVIDIA
    - META   # Meta Platforms
    - TSLA   # Tesla

  # Sector Leaders (top picks per sector)
  sector_leaders:
    - JPM    # Financials - JPMorgan Chase
    - UNH    # Healthcare - UnitedHealth
    - XOM    # Energy - ExxonMobil
    - CAT    # Industrials - Caterpillar
    - PG     # Consumer Staples - Procter & Gamble
    - HD     # Consumer Discretionary - Home Depot
    - NEE    # Utilities - NextEra Energy
    - AMT    # Real Estate - American Tower
    - LIN    # Materials - Linde

  # ETFs - Broad Market & Sector
  etfs:
    - SPY    # S&P 500
    - QQQ    # Nasdaq 100
    - DIA    # Dow Jones
    - IWM    # Russell 2000 (Small Cap)
    - XLK    # Technology Sector
    - XLF    # Financial Sector
    - XLE    # Energy Sector
    - XLV    # Healthcare Sector
    - ARKK   # ARK Innovation (Growth)

  # Growth Stocks
  growth_stocks:
    - PLTR   # Palantir
    - CRWD   # CrowdStrike
    - SNOW   # Snowflake
    - SQ     # Block (Square)
    - COIN   # Coinbase

  # Rebalancing schedule
  rebalance_day: "Friday"       # End of trading week
  rebalance_hour: 15             # 3 PM ET (before market close)
  rebalance_timezone: "America/New_York"

  # Initial portfolio
  initial_capital: 25000.0  # USD

  # Risk management
  max_position_size: 0.15    # 15% max per stock
  min_position_size: 0.02    # 2% min per stock
  min_trade_amount: 100.0    # Minimum $100 per trade
  max_single_trade: 5000.0   # Maximum $5000 per trade

  # Trading mode
  paper_trading: true  # Set to false for live trading (BE CAREFUL!)

# ML Model Configuration
ml:
  model_type: "LSTM"

  # LSTM architecture
  lstm:
    layers: 2
    units: 64
    dropout: 0.2

  # Training parameters - Position trading (weeks-months)
  training:
    lookback_days: 30         # Use 30 days to predict
    prediction_horizon: 21    # Predict 21 trading days ahead (~1 month)
    train_val_split: 0.8      # 80% train, 20% validation
    batch_size: 32
    epochs: 150
    early_stopping_patience: 15

  # Feature engineering
  features:
    moving_averages: [10, 20, 50, 200]
    use_rsi: true
    use_macd: true
    use_bollinger: true
    use_volume_indicators: true
    use_momentum: true
    use_earnings_proximity: true

# Data fetching
data:
  source: "yfinance"       # Primary data source (free, no API key)
  backup_source: "none"

  # Historical data
  historical_days: 730  # Fetch 2 years of historical data

  # Update schedule
  update_frequency: "daily"
  update_hour: 18  # 6 PM ET (after market close)

# Google Cloud Platform
gcp:
  region: "us-central1"
  project_id: "stock-ml-trading-487"

  # BigQuery
  bigquery:
    dataset: "stock_data"
    tables:
      historical_prices: "historical_prices"
      predictions: "predictions"
      trades: "trades"
      model_metrics: "model_metrics"

  # Cloud Storage
  storage:
    models_bucket: "stock-ml-models-487"
    backups_bucket: "stock-ml-backups-487"

  # Vertex AI
  vertex_ai:
    machine_type: "n1-standard-4"
    use_preemptible: true

# Streamlit Dashboard
dashboard:
  title: "ATLAS - Stock ML Intelligence Dashboard"
  refresh_interval: 300  # 5 minutes
  cache_ttl: 300

  # Display settings
  display:
    currency: "USD"
    decimal_places: 2
    use_dark_mode: true

# Logging
logging:
  level: "INFO"
  format: "json"
  log_to_bigquery: true

# Notifications
notifications:
  enabled: true
  channels:
    - "email"
  notify_on:
    - "trade_execution"
    - "model_training_complete"
    - "api_errors"
    - "weekly_summary"
    - "earnings_alert"
