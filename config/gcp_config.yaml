# Google Cloud Platform Configuration
# This file contains GCP-specific settings for ML predictions

# Project settings
project:
  id: "stock-ml-trading-487"
  region: "us-central1"
  zone: "us-central1-a"

# Vertex AI settings
vertex_ai:
  # Training configuration
  training:
    machine_type: "n1-standard-4"
    accelerator_type: "NVIDIA_TESLA_T4"
    accelerator_count: 1
    use_preemptible: true

  # Prediction endpoint configuration
  endpoint:
    machine_type: "n1-standard-2"
    min_replica_count: 0
    max_replica_count: 3
    autoscaling: true

  # Model registry
  model_registry:
    model_name: "stock-lstm-model"
    model_version: "v1"
    container_image: "gcr.io/stock-ml-trading-487/stock-lstm-prediction:latest"

# BigQuery settings
bigquery:
  dataset: "stock_data"
  location: "US"

  # Tables
  tables:
    historical_prices: "historical_prices"
    predictions: "predictions"
    trades: "trades"
    model_metrics: "model_metrics"
    portfolio_snapshots: "portfolio_snapshots"
    rebalancing_events: "rebalancing_events"

# Cloud Storage settings
storage:
  models_bucket: "stock-ml-models-487"
  training_data_bucket: "stock-ml-training-data-487"
  backups_bucket: "stock-ml-backups-487"

  lifecycle:
    models_retention_days: 365
    training_data_retention_days: 30
    backups_retention_days: 90

# Service accounts
service_accounts:
  ml_training: "ml-training-sa@stock-ml-trading-487.iam.gserviceaccount.com"
  ml_prediction: "ml-prediction-sa@stock-ml-trading-487.iam.gserviceaccount.com"
  stock_app: "stock-app-sa@stock-ml-trading-487.iam.gserviceaccount.com"

# Cost optimization
cost_optimization:
  use_preemptible: true
  scale_to_zero: true
  use_regional_pd: true
  billing_alerts:
    - amount: 10
      currency: "USD"
    - amount: 25
      currency: "USD"
    - amount: 50
      currency: "USD"

# Monitoring and logging
monitoring:
  log_level: "INFO"
  log_to_bigquery: true
  create_dashboards: true
  alert_on_errors: true
  metrics:
    - "prediction_latency"
    - "prediction_accuracy"
    - "model_confidence"
    - "endpoint_utilization"
    - "cost_per_prediction"

# Security settings
security:
  encryption_key: "projects/stock-ml-trading-487/locations/us-central1/keyRings/stock-ml-keyring/cryptoKeys/stock-ml-key"
  least_privilege: true
  vpc_connector: false
  use_secret_manager: true
  rotate_keys_days: 90

# Deployment settings
deployment:
  container_registry: "gcr.io"
  images:
    training: "gcr.io/stock-ml-trading-487/stock-lstm-training:latest"
    prediction: "gcr.io/stock-ml-trading-487/stock-lstm-prediction:latest"
  env_vars:
    GOOGLE_CLOUD_PROJECT: "stock-ml-trading-487"
    GCP_REGION: "us-central1"
    VERTEX_ENDPOINT_ID: ""
    BIGQUERY_DATASET: "stock_data"
    STORAGE_BUCKET: "stock-ml-models-487"
